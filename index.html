<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="agendamento.css">
</head>
<body>


    <header class="cabecalho">
        <h1>Agendamento de Show</h1>
    </header>


    <main class="container">
        <section class="card-formulario">
            <h2>Preencha os campos abaixo</h2>
           
            <form>
                <div class="campo">
                    <label>Nome do artista:</label>
                    <input type="text" placeholder="Ex: Alok">
                </div>


                <div class="campo">
                    <label>Data do show:</label>
                    <input type="date">
                </div>


                <div class="campo">
                    <label>Local do show:</label>
                    <input type="text" placeholder="Cidade/Estado">
                </div>
                <button type="submit" class="btn-animado">Agendar show</button>
            </form>
        </section>
    </main>


</body>
</html>
