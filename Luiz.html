<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Shows | Pisada Prime</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">PISADA<span>PRIME</span></div>
        <nav class="nav-links">
            <a href="#">Início</a>
            <a href="#">Shows</a>
            <a href="#contato">Contato</a>
        </nav>
    </header>

     <main class="container">
        <h1 class="pagina-titulo">Próximos Shows</h1>

        <section class="shows-grid">
            
            <article class="Shows">
                <div class="image-container">
                    <img src="https://tm.ibxk.com.br/2022/10/04/04113644919183.jpg" alt="Manoel Gomes" class="show-img">
                    <span class="tag-absolute">Destaque</span>
                </div>
                <div class="Shows-Conteiner">
                    <h2>Manoel Gomes</h2>
                    <p>O fenômeno da "Caneta Azul" em uma turnê inesquecível.</p>
                    <p class="data">📅 20 de Maio - São Paulo/SP</p>
                    <button class="Ingresso">Garantir Ingresso</button>
                </div>
            </article>

             <article class="Shows">
                <div class="image-container">
                    <img src="https://yt3.googleusercontent.com/ytc/AIdro_m9YgHwF3vOidM4YyI4u4PZ-9qV-WkUu6C0nO9K=s900-c-k-c0x00ffffff-no-rj" alt="Filho do Piseiro" class="show-img">
                </div>
                <div class="Shows-content">
                    <h2>Filho do Piseiro</h2>
                    <p>O melhor do piseiro romântico para dançar coladinho.</p>
                    <p class="data">📅 22 de Maio - Fortaleza/CE</p>
                    <button class="Ingresso">Garantir Ingresso</button>
                </div>
            </article>
        </section>

   
</body>
</html>
